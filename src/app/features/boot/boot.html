<div [style]="containerStyle()" 
     class="boot-container absolute inset-0 select-none text-center pointer-events-none">
  
  <!-- Accumulating Typography Stack placed below the centered JARVIS Core coordinates -->
  <div class="message-stack">
    
    @for (msg of activeMessages(); track $index) {
      <div class="message-item label-sm text-on-surface/90 transition-all duration-500 ease-out"
           [style.opacity]="msg.opacity"
           [style.transform]="msg.transform">
        {{ msg.text }}
      </div>
    }
    
    <!-- Instruction Prompt (fades in when ready) -->
    <div class="prompt-text label-sm text-primary-container/80 uppercase opacity-0 transition-opacity duration-1000 ease-in-out pt-6">
      Scroll to begin the journey
    </div>
  </div>
  
</div>
