  <!-- Layer 3: Data Streams Layer at translateZ(-400px) -->
  <div class="data-streams-layer absolute inset-0">
    <div class="stream-line line-1"></div>
    <div class="stream-line line-2"></div>
    <div class="stream-line line-3"></div>
  </div>

  <!-- AI Network Node Clusters -->
  <div class="ai-network-container absolute inset-0 transform-style-3d">
    
    <!-- Cluster A: Top-Left (Mid Depth, wakes >= 20% faintly, full >= 40%) -->
    <div class="node-cluster cluster-a absolute w-[220px] h-[220px]" 
         [class.faint]="progress() >= 20" 
         [class.active]="progress() >= 40" 
         [class.sync]="progress() === 100">
      <svg class="absolute inset-0 w-full h-full">
        <!-- Connection 1-2 -->
        <line x1="46" y1="46" x2="167" y2="67" class="conn-base" />
        <line x1="46" y1="46" x2="167" y2="67" class="conn-pulse pulse-1" />
        <!-- Connection 2-3 -->
        <line x1="167" y1="67" x2="98" y2="158" class="conn-base" />
        <line x1="167" y1="67" x2="98" y2="158" class="conn-pulse pulse-2" />
      </svg>
      <!-- Node 1: Processing Hub (Mid size, 32px) -->
      <div class="node absolute top-[30px] left-[30px] w-8 h-8 hub-node">
        <div class="outer-ring"></div>
        <div class="core bg-accent-cyan shadow-[0_0_12px_rgba(6,182,212,0.3)]"></div>
      </div>
      <!-- Node 2: Solid Node (Mid size, 14px) -->
      <div class="node absolute top-[60px] left-[160px] w-[14px] h-[14px] rounded-full bg-accent-blue/80 shadow-[0_0_8px_rgba(37,99,235,0.2)]"></div>
      <!-- Node 3: Ring Node (Mid size, 16px) -->
      <div class="node absolute top-[150px] left-[90px] w-4 h-4 rounded-full border-2 border-accent-purple/60 bg-transparent"></div>
    </div>

    <!-- Cluster B: Top-Right (Far Depth, wakes >= 20% faintly, full >= 60%) -->
    <div class="node-cluster cluster-b absolute w-[200px] h-[200px]" 
         [class.faint]="progress() >= 20" 
         [class.active]="progress() >= 60" 
         [class.sync]="progress() === 100">
      <svg class="absolute inset-0 w-full h-full">
        <line x1="46" y1="46" x2="124" y2="134" class="conn-base" />
        <line x1="46" y1="46" x2="124" y2="134" class="conn-pulse pulse-3" />
      </svg>
      <!-- Node 1: Hollow Core Node (Far size, 12px) -->
      <div class="node absolute top-[40px] left-[40px] w-3 h-3 rounded-full border border-accent-cyan/40 bg-transparent flex items-center justify-center">
        <div class="w-1 h-1 rounded-full bg-accent-cyan"></div>
      </div>
      <!-- Node 2: Solid Node (Far size, 8px) -->
      <div class="node absolute top-[130px] left-[120px] w-2 h-2 rounded-full bg-accent-purple/70"></div>
    </div>

    <!-- Cluster C: Bottom-Left (Near Depth, wakes >= 20% faintly, full >= 60%) -->
    <div class="node-cluster cluster-c absolute w-[240px] h-[240px]" 
         [class.faint]="progress() >= 20" 
         [class.active]="progress() >= 60" 
         [class.sync]="progress() === 100">
      <svg class="absolute inset-0 w-full h-full">
        <line x1="50" y1="130" x2="152" y2="72" class="conn-base" />
        <line x1="50" y1="130" x2="152" y2="72" class="conn-pulse pulse-4" />
      </svg>
      <!-- Node 1: Solid Hero Node (Near size, 20px) -->
      <div class="node absolute top-[120px] left-[40px] w-5 h-5 rounded-full bg-accent-cyan/90 shadow-[0_0_16px_rgba(6,182,212,0.4)]"></div>
      <!-- Node 2: Ring Node (Near size, 24px) -->
      <div class="node absolute top-[60px] left-[140px] w-6 h-6 rounded-full border-2 border-accent-cyan/50 bg-transparent shadow-[0_0_10px_rgba(6,182,212,0.2)]"></div>
    </div>

    <!-- Cluster D: Bottom-Right (Hero Depth, wakes >= 20% faintly, full >= 80%) -->
    <div class="node-cluster cluster-d absolute w-[250px] h-[250px]" 
         [class.faint]="progress() >= 20" 
         [class.active]="progress() >= 80" 
         [class.sync]="progress() === 100">
      <svg class="absolute inset-0 w-full h-full">
        <!-- Connection 1-2 -->
        <line x1="61" y1="61" x2="171" y2="161" class="conn-base" />
        <line x1="61" y1="61" x2="171" y2="161" class="conn-pulse pulse-5" />
        <!-- Connection 2-3 -->
        <line x1="171" y1="161" x2="69" y2="149" class="conn-base" />
        <line x1="171" y1="161" x2="69" y2="149" class="conn-pulse pulse-1" />
      </svg>
      <!-- Node 1: Large Processing Hub (Hero size, 42px) -->
      <div class="node absolute top-[40px] left-[40px] w-[42px] h-[42px] hub-node large-hub">
        <div class="outer-ring"></div>
        <div class="core bg-accent-purple shadow-[0_0_20px_rgba(168,85,247,0.4)]"></div>
      </div>
      <!-- Node 2: Hollow Core Node (Hero size, 22px) -->
      <div class="node absolute top-[150px] left-[160px] w-[22px] h-[22px] rounded-full border border-accent-cyan/50 bg-transparent flex items-center justify-center shadow-[0_0_12px_rgba(6,182,212,0.2)]">
        <div class="w-2.5 h-2.5 rounded-full bg-accent-cyan"></div>
      </div>
      <!-- Node 3: Solid Node (Hero size, 18px) -->
      <div class="node absolute top-[140px] left-[60px] w-[18px] h-[18px] rounded-full bg-accent-blue shadow-[0_0_12px_rgba(37,99,235,0.3)]"></div>
    </div>

    <!-- Cluster E: JARVIS Orbiting Cluster (Orbiting center, wakes >= 20% faintly, full >= 40%) -->
    <div class="node-cluster cluster-e absolute w-[640px] h-[640px] left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2" 
         [class.faint]="progress() >= 20" 
         [class.active]="progress() >= 40" 
         [class.sync]="progress() === 100">
      <svg class="absolute inset-0 w-full h-full">
        <!-- Connecting orbiting nodes to frame a surrounding web -->
        <line x1="147" y1="147" x2="468" y2="147" class="conn-base" />
        <line x1="147" y1="147" x2="468" y2="147" class="conn-pulse pulse-2" />
        
        <line x1="468" y1="147" x2="467" y2="467" class="conn-base" />
        <line x1="468" y1="147" x2="467" y2="467" class="conn-pulse pulse-3" />
        
        <line x1="467" y1="467" x2="146" y2="467" class="conn-base" />
        <line x1="467" y1="467" x2="146" y2="467" class="conn-pulse pulse-4" />
        
        <line x1="146" y1="467" x2="147" y2="147" class="conn-base" />
        <line x1="146" y1="467" x2="147" y2="147" class="conn-pulse pulse-5" />
      </svg>
      <!-- Node 1: Solid Orbit Node (Mid, 14px) -->
      <div class="node absolute top-[140px] left-[140px] w-[14px] h-[14px] rounded-full bg-accent-blue/80 shadow-[0_0_8px_rgba(37,99,235,0.2)]"></div>
      <!-- Node 2: Ring Orbit Node (Mid, 16px) -->
      <div class="node absolute top-[140px] left-[460px] w-4 h-4 rounded-full border border-accent-cyan/60 bg-transparent"></div>
      <!-- Node 3: Hollow Orbit Node (Mid, 14px) -->
      <div class="node absolute top-[460px] left-[460px] w-[14px] h-[14px] rounded-full border border-accent-purple/50 bg-transparent flex items-center justify-center">
        <div class="w-1.5 h-1.5 rounded-full bg-accent-purple"></div>
      </div>
      <!-- Node 4: Solid Orbit Node (Mid, 12px) -->
      <div class="node absolute top-[460px] left-[140px] w-3 h-3 rounded-full bg-accent-cyan/70"></div>
    </div>
